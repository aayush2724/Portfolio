<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LeadForge Hackathon Proof</title>
  <desc id="desc">LeadForge secured 3rd place in ThinkRoot x Vortex'26 Hackathon at NIT Trichy.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f12"/>
      <stop offset="100%" stop-color="#14181d"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 140) rotate(35) scale(420 220)">
      <stop offset="0%" stop-color="#d9ff3f" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d9ff3f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 80) rotate(40) scale(360 180)">
      <stop offset="0%" stop-color="#89ff2f" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#89ff2f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#glowA)"/>
  <rect width="1200" height="700" fill="url(#glowB)"/>

  <rect x="48" y="42" width="1104" height="616" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.14"/>

  <text x="95" y="132" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">
    ThinkRoot x Vortex'26 Hackathon, NIT Trichy
  </text>

  <text x="95" y="210" fill="#d9ff3f" font-family="Segoe UI, Arial, sans-serif" font-size="86" font-weight="900" letter-spacing="2">
    LEADFORGE
  </text>

  <text x="95" y="275" fill="#f8fafc" fill-opacity="0.85" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="600">
    AI-powered B2B lead generation pipeline
  </text>

  <rect x="95" y="332" width="520" height="8" rx="4" fill="#ffffff" fill-opacity="0.35"/>

  <circle cx="930" cy="255" r="110" fill="url(#bronze)"/>
  <text x="930" y="240" text-anchor="middle" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="900">3rd</text>
  <text x="930" y="280" text-anchor="middle" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">PLACE</text>

  <text x="95" y="430" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">
    Achievement
  </text>
  <text x="95" y="474" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="500">
    Secured 3rd place with LeadForge among college teams.
  </text>

  <text x="95" y="594" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">
    Portfolio proof card • Replace this file anytime with your original poster image.
  </text>
</svg>
