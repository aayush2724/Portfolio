<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Chord Detector Cover</title>
  <desc id="desc">Computer vision concept art for detecting guitar chords from a camera feed.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect x="130" y="90" width="940" height="520" rx="26" fill="#020617" opacity="0.55"/>
  <rect x="190" y="150" width="420" height="360" rx="20" fill="#111827" opacity="0.9" stroke="#60a5fa" stroke-opacity="0.5"/>
  <line x1="250" y1="170" x2="250" y2="490" stroke="#f8fafc" stroke-opacity="0.25"/>
  <line x1="310" y1="170" x2="310" y2="490" stroke="#f8fafc" stroke-opacity="0.25"/>
  <line x1="370" y1="170" x2="370" y2="490" stroke="#f8fafc" stroke-opacity="0.25"/>
  <line x1="430" y1="170" x2="430" y2="490" stroke="#f8fafc" stroke-opacity="0.25"/>
  <line x1="490" y1="170" x2="490" y2="490" stroke="#f8fafc" stroke-opacity="0.25"/>
  <line x1="550" y1="170" x2="550" y2="490" stroke="#f8fafc" stroke-opacity="0.25"/>
  <circle cx="370" cy="250" r="14" fill="#22d3ee"/>
  <circle cx="430" cy="310" r="14" fill="#22d3ee"/>
  <circle cx="490" cy="370" r="14" fill="#22d3ee"/>
  <rect x="670" y="170" width="320" height="64" rx="12" fill="#22d3ee" fill-opacity="0.2"/>
  <text x="690" y="212" fill="#e0f2fe" font-size="28" font-family="Verdana, Geneva, sans-serif" font-weight="700">Detected: G Major</text>
  <rect x="670" y="260" width="320" height="220" rx="16" fill="#f8fafc" fill-opacity="0.07"/>
  <text x="695" y="315" fill="#e2e8f0" font-size="24" font-family="Verdana, Geneva, sans-serif">camera stream + cv model</text>
  <text x="155" y="640" fill="#dbeafe" font-size="50" font-family="Verdana, Geneva, sans-serif" font-weight="700">Chord Detector</text>
</svg>
