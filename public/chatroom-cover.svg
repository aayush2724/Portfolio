<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">chatRoom Cover</title>
  <desc id="desc">Real time messaging interface style cover for chatRoom project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#be185d"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect x="110" y="110" width="980" height="480" rx="24" fill="#0f172a" opacity="0.5"/>
  <rect x="170" y="180" width="380" height="90" rx="20" fill="#fbcfe8" opacity="0.25"/>
  <rect x="650" y="290" width="380" height="90" rx="20" fill="#fecdd3" opacity="0.2"/>
  <rect x="170" y="400" width="380" height="90" rx="20" fill="#fbcfe8" opacity="0.18"/>
  <text x="160" y="620" fill="#fff1f2" font-size="58" font-family="Verdana, Geneva, sans-serif" font-weight="700">chatRoom</text>
</svg>
